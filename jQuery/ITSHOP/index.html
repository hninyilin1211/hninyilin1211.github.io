<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">IT Shop</div>
        <div class="nav-right">
            <span class="home-text">Home</span>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge">0</span>
            </div>
        </div>
    </header>

    <main class="container">
        
        <div class="product-grid">
            <div class="card">
                <img src="images/image/laptop.webp" alt="Laptop 1">
                <div class="card-body">
                    <h3>Laptop 1</h3>
                    <p class="price">Price : 2300000 MMK</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/laptop1.webp" alt="Laptop 2">
                <div class="card-body">
                    <h3>Laptop 2</h3>
                    <p class="price">Price : 2000000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/laptop2.webp" alt="Laptop 3">
                <div class="card-body">
                    <h3>Laptop 3</h3>
                    <p class="price">Price : 1900000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/laptop3.webp" alt="Laptop 4">
                <div class="card-body">
                    <h3>Laptop 4</h3>
                    <p class="price">Price : 1850000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>
        </div>

        <div class="product-grid">
            <div class="card">
                <img src="images/image/ip14pro.webp" alt="iPhone 1">
                <div class="card-body">
                    <h3>iPhone 1</h3>
                    <p class="price">Price : 3400000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/ip14pro1.webp" alt="iPhone 2">
                <div class="card-body">
                    <h3>iPhone 2</h3>
                    <p class="price">Price : 3200000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/ip14pro2.webp" alt="iPhone 3">
                <div class="card-body">
                    <h3>iPhone 3</h3>
                    <p class="price">Price : 3100000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>

            <div class="card">
                <img src="images/image/ip14pro4.webp" alt="iPhone 4">
                <div class="card-body">
                    <h3>iPhone 4</h3>
                    <p class="price">Price : 3000000</p>
                    <button class="btn-add">Add to Cart</button>
                </div>
            </div>
        </div>

    </main>

</body>
</html>

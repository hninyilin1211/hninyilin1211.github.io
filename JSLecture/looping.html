<!doctype html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping</title>      
</head>
<body>
<script>  
//nested loop 
for (let i = 1; i <= 15; i++) {
    for (let j = 1; j <= i; j++) { 
        document.write("*");
    }
    document.write("<br>");
}
//while loop
let number =parseInt(prompt("enter a number"));
while (number <100) {
    document.write(`Your Number of while loop: ${number} <br>`);
    number+= 10;
}

//do while loop
let nu = parseInt(prompt("enter a number"));
do {
    document.write(`Your Number of do-while loop: ${nu} <br>`);
    nu+= 50;
} while (nu <1000);
</script>
</body>
</html>

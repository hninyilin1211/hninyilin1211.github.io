<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Courier New', Courier, monospace; 
}

body {
    background-color: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00ff88; 
}

.clock-container {
    text-align: center;
    background: #222;
    padding: 30px 50px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
}

#date {
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: #888; 
}

#clock {
    font-size: 60px;
    font-weight: bold;
}

#ampm {
    font-size: 25px;
    color: #ff0055; 
    margin-left: 10px;
}</style>
</head>
<body>

    <div class="clock-container">
        <div id="date">Monday, January 1, 2026</div>
        <div id="clock">12:00:00 <span id="ampm">AM</span></div>
    </div>

    <script> function updateClock() {
    const now = new Date();

    //  Array for day names
    const daysArray = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    
    //  Array for month names
    const monthsArray = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    
    let dayName = daysArray[now.getDay()];       // ဥပမာ - Mon ဆိုရင် Index 1 ကို ယူမယ်
    let monthName = monthsArray[now.getMonth()]; // ဥပမာ - June ဆိုရင် Index 5 ကို ယူမယ်
    let dateNum = now.getDate();
    let year = now.getFullYear();

  
    let dateString = `${dayName}, ${monthName} ${dateNum}, ${year}`;
    document.getElementById('date').innerText = dateString;

   
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();
    let ampm = hours >= 12 ? 'PM' : 'AM';

    hours = hours % 12;
    hours = hours ? hours : 12; 

    hours = hours < 10 ? '0' + hours : hours;
    minutes = minutes < 10 ? '0' + minutes : minutes;
    seconds = seconds < 10 ? '0' + seconds : seconds;

    document.getElementById('clock').innerHTML = `${hours}:${minutes}:${seconds} <span id="ampm">${ampm}</span>`;
}

setInterval(updateClock, 1000);
updateClock();</script>
</body>
</html>

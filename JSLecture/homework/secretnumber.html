<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Number</title>
</head>
<body>

    <script>
   let secretNumber =12;
    let count=0;
    let accept;

    while(accept!=secretNumber){
     accept=parseInt(prompt("Enter a number between 1 and 100:"));
     count++;
    if(accept<secretNumber){
        alert("Your answer is wrong. Try again.");
    }else if(accept>secretNumber){
        alert(" Your answer is wrong. Try again.");
    }
    }
    document.write(`You found it in ${count} guesses!`);
   
    </script>
</body>
</html>

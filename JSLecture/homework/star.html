<!doctype html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping</title>      
</head>
<body>
<script>   

for (let k = 9; k >= 1; k--) {
    for (let u = 1; u <= k; u++) { 
        document.write("*");
    }
    document.write("<br>");
}



</script>
</body>
</html>

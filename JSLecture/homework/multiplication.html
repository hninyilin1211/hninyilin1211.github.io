<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Table</title>
</head>
<body>
<script> 
let number = prompt("Add a number");
for (let i = 1; i <= 15; i++) {
        let result = number * i;
        document.write(`${number} x ${i} = ${result}<br>`);
    }
</script>
</body>
</html>

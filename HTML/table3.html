<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complex Table Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            text-align: center;
        }
        th, td {
            border: 2px solid #333;
            padding: 15px;
            font-family: sans-serif;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <table>
        <tbody>
            <tr>
                <td rowspan="2">No</td>
                <td>Problem</td>
                <td>for</td>
                <td>a web</td>
            </tr>
            <tr>
                <td>professional</td>
                <td rowspan="2" colspan="2">as</td>
            </tr>
            <tr>
                <td colspan="2">you</td>
            </tr>
            <tr>
                <td>will</td>
                <td rowspan="2">see</td>
                <td rowspan="2">a few</td>
                <td rowspan="2">minus</td>
            </tr>
            <tr>
                <td>in</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
